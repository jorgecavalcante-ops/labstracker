<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabTrack Pro - IFTO Araguaína</title>
    <script>
        // Emergency fix for "Cannot set property fetch of #<Window> which has only a getter"
        (function() {
            var _fetch = window.fetch;
            try {
                Object.defineProperty(window, 'fetch', {
                    get: function() { return _fetch; },
                    set: function(v) { console.warn('Blocked attempt to overwrite window.fetch'); },
                    configurable: true,
                    enumerable: true
                });
            } catch(e) {}
        })();

        // ===== ROTEAMENTO SPA =====
        // Detecta a path atual e sincroniza com o estado do app
        function getCurrentRoute() {
            // Remove trailing slash e base path se houver
            let path = window.location.pathname;
            // Se houver base path (ex: /labstrach.pages.dev), remova
            path = path.replace(/^\/[^\/]+\.pages\.dev/, '');
            // Remove trailing slash
            path = path.replace(/\/$/, '') || '/';
            return path;
        }

        function navigateTo(path) {
            // Normaliza path
            if (!path.startsWith('/')) path = '/' + path;
            // Usa history API para não recarregar página
            window.history.pushState({}, '', path);
            // Trigger evento customizado para Alpine atualizar
            window.dispatchEvent(new CustomEvent('routechange'));
        }
    </script>
    <script src="https://cdn.tailwindcss.com/3.4.15"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.446.0/dist/umd/lucide.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap');
        
        :root {
            --sidebar-width: 260px;
            --accent-blue: #3b82f6;
            --bg-base: #09090b;
            --bg-sidebar: #121214;
            --bg-card: #18181b;
            --border-dim: #27272a;
            --text-muted: #71717a;
            --text-dim: #a1a1aa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: #e4e4e7;
            overflow-x: hidden;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }
        .sidebar {
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-dim);
            height: 100vh;
            width: var(--sidebar-width);
            position: fixed;
            left: 0;
            top: 0;
            z-index: 50;
            transition: transform 0.3s ease-in-out;
        }
        .sidebar.mobile-hidden {
            transform: translateX(-100%);
        }
        @media (min-width: 768px) {
            .sidebar.mobile-hidden {
                transform: translateX(0);
            }
        }
        .main-content {
            transition: margin-left 0.3s ease-in-out;
            min-height: 100vh;
        }
        @media (min-width: 768px) {
            .main-content {
                margin-left: var(--sidebar-width);
            }
        }
        .nav-item {
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-dim);
            transition: all 0.2s;
            border-left: 3px solid transparent;
            width: 100%;
            text-align: left;
            cursor: pointer;
            background: none;
            border: none;
        }
        .nav-item:hover {
            color: #fff;
            background: #1a1a1c;
        }
        .nav-item.active {
            color: #fff;
            background: #1e1e21;
            border-left-color: var(--accent-blue);
        }
        .main-header {
            height: 64px;
            border-bottom: 1px solid var(--border-dim);
            background: var(--bg-base);
            display: flex;
            align-items: center;
            padding: 0 32px;
        }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .meta-box {
            background: var(--bg-card);
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-dim);
        }
        .meta-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .meta-value {
            font-size: 13px;
            font-weight: 600;
            color: #f4f4f5;
        }
        .procedure-card {
            background: var(--bg-base);
            border: 1px solid var(--border-dim);
            padding: 24px;
            border-radius: 8px;
        }
        .procedure-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .procedure-table th {
            text-align: left;
            background: var(--bg-card);
            padding: 12px;
            color: var(--text-dim);
            font-weight: 600;
            border-bottom: 1px solid var(--border-dim);
        }
        .procedure-table td {
            padding: 12px;
            border-bottom: 1px solid #1f1f23;
            vertical-align: top;
            color: #d1d1d6;
        }
        .eq-card {
            padding: 16px 20px;
            background: #0c0c0e;
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .eq-card:hover {
            background: #161619;
            border-color: #3f3f46;
        }
        .status-pill {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        .tech-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent-blue);
        }
        .lab-hero-card {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            padding: 32px;
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .lab-hero-card:hover {
            border-color: var(--accent-blue);
            background: #1c1c20;
        }
        .pdf-viewer-container {
            background: var(--bg-card);
            border: 1px solid var(--border-dim);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .pdf-viewer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #1f1f23;
            border-bottom: 1px solid var(--border-dim);
            gap: 12px;
            flex-wrap: wrap;
        }
        .pdf-viewer-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pdf-viewer-controls button {
            padding: 6px 12px;
            background: #2a2a2e;
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            color: #a1a1aa;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .pdf-viewer-controls button:hover:not(:disabled) {
            background: #3a3a3e;
            color: #fff;
        }
        .pdf-viewer-controls button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pdf-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-dim);
        }
        .pdf-page-input {
            width: 50px;
            padding: 4px 8px;
            background: #2a2a2e;
            border: 1px solid var(--border-dim);
            border-radius: 4px;
            color: #fff;
            font-size: 12px;
            text-align: center;
        }
        #pdf-canvas {
            max-width: 100%;
            margin: 0 auto;
            display: block;
        }
        .pdf-viewer-body {
            flex: 1;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0c0c0e;
            padding: 20px;
        }
        .pdf-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-dim);
            font-size: 14px;
        }
        .pdf-loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border-dim);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body x-data="labApp()" class="flex overflow-x-hidden">
    <!-- Overlay for mobile -->
    <div x-show="sidebarOpen" 
         @click="sidebarOpen = false" 
         class="fixed inset-0 bg-black/50 z-40 md:hidden transition-opacity"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
    </div>
    <!-- Sidebar -->
    <aside class="sidebar flex flex-col" :class="sidebarOpen ? '' : 'mobile-hidden'">
        <div class="flex flex-col h-full">
            <!-- Brand -->
            <div class="p-8 pb-10 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3">
                    <div class="h-8 w-8 bg-blue-600 rounded-lg flex items-center justify-center">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 2v20M2 12h20M12 2l10 10-10 10L2 12 12 2z"/></svg>
                    </div>
                    <h1 class="font-extrabold text-lg tracking-tight text-white">LabTrack <span class="text-blue-500">Pro</span></h1>
                </div>
                <button @click="sidebarOpen = false" class="md:hidden text-zinc-500 hover:text-white">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            <!-- Navigation -->
            <nav class="flex-1 space-y-1">
                <button @click="goHome()" class="nav-item" :class="isActive('/') ? 'active' : ''">
                    <i data-lucide="layout-dashboard" class="w-4 h-4"></i>
                    <span>Dashboard</span>
                </button>
                
                <div class="px-6 pt-6 pb-2">
                    <span class="text-[10px] uppercase tracking-widest font-bold text-zinc-600">Laboratórios</span>
                </div>
                <template x-for="lab in labs" :key="lab.id">
                    <button @click="goToLab(lab)" class="nav-item" :class="isActive('/' + lab.id) ? 'active' : ''">
                        <i :data-lucide="lab.icon" class="w-4 h-4"></i>
                        <span x-text="lab.name"></span>
                    </button>
                </template>
            </nav>
            <div class="p-6">
                <div class="bg-zinc-900 rounded-lg p-3 flex items-center gap-3 border border-zinc-800">
                    <div class="h-6 w-6 rounded bg-blue-500/20 flex items-center justify-center">
                        <i data-lucide="shield" class="w-3 h-3 text-blue-500"></i>
                    </div>
                    <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-tight">Ambiente Seguro</span>
                </div>
            </div>
        </div>
    </aside>
    <!-- Main Content -->
    <main class="main-content flex-1 min-h-screen">
        
        <header class="main-header justify-between sticky top-0 z-20">
            <div class="flex items-center gap-4 text-[13px]">
                <button @click="sidebarOpen = true" class="md:hidden text-zinc-400 hover:text-white">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex items-center gap-2">
                    <span class="text-zinc-500 hidden sm:inline">Lab</span>
                    <span class="text-blue-500 font-semibold" x-text="getBreadcrumb()"></span>
                </div>
            </div>
            <div class="text-[11px] font-mono text-zinc-600 uppercase tracking-widest hidden sm:block">Procedimentos Pop v2.0</div>
        </header>
        <div class="p-4 sm:p-8">
            <!-- Home -->
            <div x-show="currentRoute === '/'" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="meta-box text-center md:text-left">
                        <div class="meta-label">Total Documentos</div>
                        <div class="text-2xl font-bold text-white tracking-tight" x-text="totalItems"></div>
                    </div>
                    <div class="meta-box text-center md:text-left">
                        <div class="meta-label">Última Revisão</div>
                        <div class="text-2xl font-bold text-white tracking-tight">2026</div>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <template x-for="lab in labs" :key="lab.id">
                        <div @click="goToLab(lab)" class="lab-hero-card">
                            <div class="h-10 w-10 rounded border border-blue-500/20 bg-blue-500/5 flex items-center justify-center mb-6 group-hover:bg-blue-500 group-hover:border-blue-500 transition-all">
                                <i :data-lucide="lab.icon" class="w-5 h-5 text-blue-500"></i>
                            </div>
                            <h4 class="font-bold text-sm text-white mb-1" x-text="lab.name"></h4>
                            <p class="text-zinc-500 text-[11px] leading-tight" x-text="lab.description"></p>
                        </div>
                    </template>
                </div>
            </div>
            <!-- Lab List -->
            <div x-show="currentRoute.startsWith('/') && !currentRoute.includes('/item/') && currentRoute !== '/'">
                <template x-if="selectedLab">
                    <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
                        <template x-if="selectedLab.id === 'multididatico'">
                            <div id="equipamentos-multididatico" class="col-span-full mb-6">
                                <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-4">Equipamentos Disponíveis</h3>
                                <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
                                    <template x-for="(item, index) in selectedLab.items" :key="index">
                                        <div @click="goToItem(item, selectedLab, index)" class="eq-card">
                                            <div class="flex justify-between items-start mb-4">
                                                <span class="text-[10px] font-mono text-zinc-600 uppercase tracking-widest" x-text="'POP-' + String(index + 1).padStart(3, '0')"></span>
                                                <div class="status-pill !bg-transparent border border-emerald-500/20 !text-emerald-500">OK</div>
                                            </div>
                                            <h5 class="text-zinc-100 font-bold text-sm mb-1 line-clamp-1" x-text="item.name"></h5>
                                            <div class="flex items-center gap-2">
                                                <span class="text-[11px] text-zinc-500" x-text="item.brand"></span>
                                                <span x-show="item.model" class="w-1 h-1 bg-zinc-800 rounded-full"></span>
                                                <span x-show="item.model" class="text-[11px] text-blue-400 font-mono" x-text="item.model"></span>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                        <template x-if="selectedLab.id !== 'multididatico'">
                            <template x-for="(item, index) in selectedLab.items" :key="index">
                                <div @click="goToItem(item, selectedLab, index)" class="eq-card">
                                    <div class="flex justify-between items-start mb-4">
                                        <span class="text-[10px] font-mono text-zinc-600 uppercase tracking-widest" x-text="'POP-' + String(index + 1).padStart(3, '0')"></span>
                                        <div class="status-pill !bg-transparent border border-emerald-500/20 !text-emerald-500">OK</div>
                                    </div>
                                    <h5 class="text-zinc-100 font-bold text-sm mb-1 line-clamp-1" x-text="item.name"></h5>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[11px] text-zinc-500" x-text="item.brand"></span>
                                        <span x-show="item.model" class="w-1 h-1 bg-zinc-800 rounded-full"></span>
                                        <span x-show="item.model" class="text-[11px] text-blue-400 font-mono" x-text="item.model"></span>
                                    </div>
                                </div>
                            </template>
                        </template>
                    </div>
                </template>
            </div>
            <!-- Detail -->
            <div x-show="currentRoute.includes('/item/')" class="max-w-5xl mx-auto pb-20">
                <template x-if="selectedItem">
                    <div>
                        <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-6 gap-6">
                            <div>
                                <button @click="goBack()" class="text-[11px] uppercase font-bold text-zinc-500 hover:text-white flex items-center gap-2 mb-6 group">
                                    <i data-lucide="arrow-left" class="w-3 h-3 group-hover:-translate-x-1 transition-transform"></i> Voltar à Lista
                                </button>
                                <h2 class="text-3xl font-extrabold text-white tracking-tighter" x-text="selectedItem.name"></h2>
                                <div class="tech-label mt-2" x-text="'ID TÉCNICO: ' + (selectedItem.model || 'PROTOCOLO-GERAL')"></div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="status-pill scale-110">Operacional</div>
                            </div>
                        </div>
                        <!-- Protocol Section -->
                        <div class="mb-12">
                            <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-6">Protocolo Operacional</h3>
                            <div class="procedure-card bg-zinc-900/50 border-zinc-800 mb-8">
                                <div class="text-[13px] text-zinc-400 leading-relaxed whitespace-pre-line" x-text="selectedItem.procedure"></div>
                            </div>
                            <template x-if="selectedItem.tables?.length">
                                <div class="space-y-6">
                                    <template x-for="table in selectedItem.tables">
                                        <div class="border border-zinc-800 rounded-xl overflow-hidden">
                                            <div class="px-4 py-2 bg-zinc-900/80 border-b border-zinc-800">
                                                <span class="text-[10px] font-bold uppercase text-zinc-400" x-text="table.title"></span>
                                            </div>
                                            <div class="overflow-x-auto">
                                                <table class="procedure-table">
                                                    <thead>
                                                        <tr>
                                                            <template x-for="header in table.headers">
                                                                <th x-text="header"></th>
                                                            </template>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <template x-for="row in table.rows">
                                                            <tr>
                                                                <template x-for="cell in row">
                                                                    <td x-text="cell"></td>
                                                                </template>
                                                            </tr>
                                                        </template>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <!-- Document Section -->
                        <div class="mb-12">
                            <div class="flex items-center justify-between mb-6">
                                <h3 class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Documento Técnico</h3>
                                <template x-if="getPdfStatus() !== 'no-file'">
                                    <div class="flex gap-2">
                                        <a :href="getDownloadLink()" download 
                                           class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg transition-colors">
                                            <i data-lucide="download" class="w-4 h-4"></i>
                                            Baixar PDF
                                        </a>
                                    </div>
                                </template>
                            </div>

                            <!-- Visualizador de PDF Local com PDF.js -->
                            <template x-if="getPdfStatus() === 'loading'">
                                <div class="pdf-viewer-container" style="height: 750px;">
                                    <div class="pdf-viewer-body">
                                        <div class="pdf-loading">
                                            <span class="pdf-loading-spinner"></span>
                                            Carregando PDF...
                                        </div>
                                    </div>
                                </div>
                            </template>

                            <template x-if="getPdfStatus() === 'ready'">
                                <div class="pdf-viewer-container" style="height: 750px;">
                                    <div class="pdf-viewer-header">
                                        <div class="pdf-viewer-controls">
                                            <button @click="prevPage()" :disabled="!canPrevPage()" title="Página Anterior">
                                                <i data-lucide="chevron-left" class="w-4 h-4 inline"></i>
                                                Anterior
                                            </button>
                                            <div class="pdf-info">
                                                <input type="number" class="pdf-page-input" 
                                                       x-model.number="currentPdfPage" 
                                                       @change="goToPage()" 
                                                       :min="1" 
                                                       :max="totalPdfPages">
                                                <span x-text="` de ${totalPdfPages}`"></span>
                                            </div>
                                            <button @click="nextPage()" :disabled="!canNextPage()" title="Próxima Página">
                                                Próxima
                                                <i data-lucide="chevron-right" class="w-4 h-4 inline"></i>
                                            </button>
                                        </div>
                                        <div class="pdf-viewer-controls">
                                            <button @click="zoomOut()" :disabled="currentZoom <= 50" title="Reduzir Zoom">
                                                <i data-lucide="zoom-out" class="w-4 h-4 inline"></i>
                                            </button>
                                            <span class="text-[12px] text-zinc-500 w-12 text-center" x-text="currentZoom + '%'"></span>
                                            <button @click="zoomIn()" :disabled="currentZoom >= 200" title="Aumentar Zoom">
                                                <i data-lucide="zoom-in" class="w-4 h-4 inline"></i>
                                            </button>
                                            <button @click="resetZoom()" title="Redefinir Zoom">100%</button>
                                        </div>
                                    </div>
                                    <div class="pdf-viewer-body">
                                        <canvas id="pdf-canvas" style="max-height: calc(750px - 60px);"></canvas>
                                    </div>
                                </div>
                            </template>

                            <!-- Erro ao carregar PDF -->
                            <template x-if="getPdfStatus() === 'error'">
                                <div class="bg-zinc-900/50 border border-dashed border-zinc-800 rounded-xl p-16 text-center">
                                    <div class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i data-lucide="alert-circle" class="w-8 h-8 text-red-500"></i>
                                    </div>
                                    <h3 class="text-zinc-300 font-bold mb-2">Erro ao Carregar PDF</h3>
                                    <p class="text-[12px] text-zinc-500 max-w-sm mx-auto" x-text="pdfError"></p>
                                </div>
                            </template>

                            <!-- Sem PDF disponível -->
                            <template x-if="getPdfStatus() === 'no-file'">
                                <div class="bg-zinc-900/50 border border-dashed border-zinc-800 rounded-xl p-16 text-center">
                                    <div class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <i data-lucide="file-question" class="w-8 h-8 text-zinc-600"></i>
                                    </div>
                                    <h3 class="text-zinc-300 font-bold mb-2">Visualização Indisponível</h3>
                                    <p class="text-[12px] text-zinc-500 max-w-sm mx-auto">
                                        O arquivo PDF para este POP ainda não foi adicionado.
                                    </p>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

        function labApp() {

                pdfBlobUrl: null,
                
                get totalItems() {

                            items: [

                                { name: 'Balança Analítica', brand: 'SHIMADZU', model: 'ATX-R' },

                                { name: 'Estufa de Cultura Bacteriológica', brand: 'SP Labor', model: 'SP-200' },
                                { name: 'Estufa Digital Esterilização e Secagem', brand: 'BIOPAR', model: 'S150ST' },
                                { name: 'Forno Mufla', brand: 'PHOENIX', model: 'AV 100L' },
                                { name: 'Incubadora Shaker', brand: 'LUCADEMA', model: 'LUCA-222' },
                                { name: 'Manta Aquecedora', brand: 'FAITHFUL', model: '125 mL' },
                                { name: 'Micrótomo', brand: 'LUPETEC', model: 'MRP 2015' },

                        {

                            name: 'Biossegurança',
                            icon: 'shield-check',
                            description: 'Padrões de higiene e segurança física nos laboratórios.',
                            items: [
                                { name: 'Higienização das Mãos', brand: 'IFTO', model: 'POP.IFTO 001' },
                                { name: 'Limpeza de Bancada', brand: 'IFTO', model: 'POP.IFTO 003' },
                                { name: 'Lavagem de Vidrarias', brand: 'IFTO', model: 'POP.IFTO 002' },
                            ]
                        }
                    ];
                    
                    // Sincronizar com rota ao carregar
                    this.syncRouteToApp();
                    
                    // Listener para quando a rota muda
                    window.addEventListener('popstate', () => this.syncRouteToApp());
                    window.addEventListener('routechange', () => this.syncRouteToApp());
                    
                    // Renderizar ícones Lucide
                    this.$nextTick(() => {
                        window.addEventListener('load', () => lucide.createIcons());
                        this.$watch('currentRoute', () => lucide.createIcons());
                        this.$watch('selectedItem', () => {
                            if (this.selectedItem && this.getPdfStatus() !== 'no-file') {
                                this.loadPdf();
                            }
                        });
                    });
                },

                syncRouteToApp() {
                    let path = getCurrentRoute();
                    this.currentRoute = path;
                    
                    // Se é uma rota de lab
                    if (path !== '/' && !path.includes('/item/')) {
                        const labId = path.substring(1);
                        this.selectedLab = this.labs.find(l => l.id === labId);
                        if (!this.selectedLab) {
                            this.currentRoute = '/';
                        }
                    }
                    
                    // Se é uma rota de detalhe
                    if (path.includes('/item/')) {
                        const parts = path.split('/item/');
                        const labId = parts[0].substring(1);
                        const itemIndex = parseInt(parts[1]);
                        
                        this.selectedLab = this.labs.find(l => l.id === labId);
                        if (this.selectedLab && itemIndex >= 0 && itemIndex < this.selectedLab.items.length) {
                            this.selectedItem = this.selectedLab.items[itemIndex];
                            this.selectedItemIndex = itemIndex;
                        } else {
                            this.currentRoute = '/';
                        }
                    }
                },

                isActive(route) {
                    return this.currentRoute === route || (route !== '/' && this.currentRoute.startsWith(route));
                },

                getBreadcrumb() {
                    if (this.currentRoute === '/') return '/ Visão Geral';
                    if (this.selectedLab) {
                        if (this.selectedItem) {
                            return `/ ${this.selectedLab.name} / ${this.selectedItem.name}`;
                        }
                        return `/ ${this.selectedLab.name}`;
                    }
                    return '/ Visão Geral';
                },

                goHome() {
                    navigateTo('/');
                    this.sidebarOpen = false;
                },

                goToLab(lab) {
                    navigateTo(`/${lab.id}`);
                    this.sidebarOpen = false;
                },

                goToItem(item, lab, index) {
                    navigateTo(`/${lab.id}/item/${index}`);
                },

                goBack() {
                    if (this.selectedItem) {
                        navigateTo(`/${this.selectedLab.id}`);
                    } else {
                        navigateTo('/');
                    }
                },

                getPdfFilePath() {
                    if (!this.selectedItem || !this.selectedLab) return null;
                    const labId = this.selectedLab.id;
                    const itemName = this.selectedItem.name;
                    const filePath = PDF_MAPPING[labId]?.[itemName];
                    console.log(`Procurando PDF: Lab=${labId}, Item="${itemName}", Path=${filePath}`);
                    return filePath;
                },

                getPdfStatus() {
                    const filePath = this.getPdfFilePath();
                    if (!filePath) return 'no-file';
                    return this.pdfStatus;
                },

                getDownloadLink() {
                    const filePath = this.getPdfFilePath();
                    if (!filePath) return '#';
                    return `https://github.com/jorgecavalcante-ops/labstracker/raw/main/${filePath}`;
                },

                async fetchPdfAsBlob(filePath) {
                    try {
                        const url = `https://raw.githubusercontent.com/jorgecavalcante-ops/labstracker/main/${filePath}`;
                        console.log(`Buscando PDF de: ${url}`);
                        const response = await fetch(url);
                        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                        return await response.blob();
                    } catch (error) {
                        console.error('Erro ao buscar PDF:', error);
                        throw new Error(`Falha ao baixar PDF: ${error.message}`);
                    }
                },

                async loadPdf() {
                    try {
                        const filePath = this.getPdfFilePath();
                        if (!filePath) {
                            this.pdfStatus = 'no-file';
                            return;
                        }
                        
                        this.pdfStatus = 'loading';
                        this.pdfError = '';
                        
                        // Limpar blob anterior
                        if (this.pdfBlobUrl) {
                            URL.revokeObjectURL(this.pdfBlobUrl);
                        }
                        
                        // Buscar PDF como blob
                        console.log(`Iniciando carregamento do PDF: ${filePath}`);
                        const pdfBlob = await this.fetchPdfAsBlob(filePath);
                        this.pdfBlobUrl = URL.createObjectURL(pdfBlob);
                        
                        // Carregar PDF
                        const pdf = await pdfjsLib.getDocument(this.pdfBlobUrl).promise;
                        this.pdfDoc = pdf;
                        this.totalPdfPages = pdf.numPages;
                        this.currentPdfPage = 1;
                        this.currentZoom = 100;
                        
                        await this.$nextTick();
                        this.pdfStatus = 'ready';
                        console.log(`PDF carregado com sucesso: ${this.totalPdfPages} páginas`);
                        this.renderPage();
                    } catch (error) {
                        console.error('Erro ao carregar PDF:', error);
                        this.pdfStatus = 'error';
                        this.pdfError = error.message;
                    }
                },

                async renderPage() {
                    if (!this.pdfDoc || this.pdfStatus !== 'ready') return;
                    try {
                        const page = await this.pdfDoc.getPage(this.currentPdfPage);
                        const scale = this.currentZoom / 100;
                        const viewport = page.getViewport({ scale });
                        
                        const canvas = document.getElementById('pdf-canvas');
                        if (!canvas) return;
                        
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;
                        
                        const context = canvas.getContext('2d');
                        const renderContext = {
                            canvasContext: context,
                            viewport: viewport
                        };
                        
                        await page.render(renderContext).promise;
                        
                        if (typeof lucide !== 'undefined') {
                            lucide.createIcons();
                        }
                    } catch (error) {
                        console.error('Erro ao renderizar página:', error);
                    }
                },

                nextPage() {
                    if (this.currentPdfPage < this.totalPdfPages) {
                        this.currentPdfPage++;
                        this.renderPage();
                    }
                },

                prevPage() {
                    if (this.currentPdfPage > 1) {
                        this.currentPdfPage--;
                        this.renderPage();
                    }
                },

                canNextPage() {
                    return this.pdfDoc && this.currentPdfPage < this.totalPdfPages;
                },

                canPrevPage() {
                    return this.pdfDoc && this.currentPdfPage > 1;
                },

                goToPage() {
                    if (this.currentPdfPage < 1) this.currentPdfPage = 1;
                    if (this.currentPdfPage > this.totalPdfPages) this.currentPdfPage = this.totalPdfPages;
                    this.renderPage();
                },

                zoomIn() {
                    if (this.currentZoom < 200) {
                        this.currentZoom += 25;
                        this.renderPage();
                    }
                },

                zoomOut() {
                    if (this.currentZoom > 50) {
                        this.currentZoom -= 25;
                        this.renderPage();
                    }
                },

                resetZoom() {
                    this.currentZoom = 100;
                    this.renderPage();
                }
            }
        }
